<h2 class="text-center">Que dégustez-vous ?</h2>
<form
  [formGroup]="wineIdForm"
  method="post"
  class="w-xl"
>
  @for (step of steps; track step.name) {
    @switch (step.type) {
      @case ('input') {
        <app-form-input
          [placeholder]="step.placeholder"
          [name]="step.name"
          [parentForm]="wineIdForm"
        ></app-form-input>
      }
      @case ('radio') {
        <app-form-radio
          [name]="step.name"
          [placeholder]="step.placeholder"
          [options]="$any(step.opts) ?? []"
        ></app-form-radio>
      }
      @case ('checkbox') {
        <app-form-checkbox
          [name]="step.name"
          [placeholder]="step.placeholder"
          [options]="$any(step.opts) ?? []"
        ></app-form-checkbox>
      }
      @case ('aroma-selector') {
        <app-form-checkbox
          [name]="step.name"
          [placeholder]="step.placeholder"
          [options]="$any(step.opts) ?? []"
        ></app-form-checkbox>
      }
    }
  }
</form>
<input
  type="submit"
  value="Suivant"
  class="btn-interaction-style"
/>
