<div class="bg-primary-400 m-2 items-center rounded-xl p-4">
  <fieldset
    class="flex w-full flex-wrap items-center justify-center gap-3 text-center"
  >
    <legend class="font-bold">{{ placeholder() }}</legend>
    @for (opt of options(); track opt; let i = $index) {
      <div class="flex items-center">
        <input
          type="checkbox"
          [name]="name()"
          [id]="name + '-' + i"
          [value]="opt"
          [checked]="value().includes(opt)"
          (change)="toggleOptions(opt)"
        />
        <label
          [for]="name + '-' + i"
          class="pl-2"
          >{{ opt }}</label
        >
      </div>
    }
  </fieldset>
</div>
