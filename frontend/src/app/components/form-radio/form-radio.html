<div class="m-2 flex items-center">
  <fieldset class="flex w-full items-center justify-around text-center">
    <legend class="w-1/4 font-bold">{{ placeholder() }}</legend>
    @for (opt of options(); track opt) {
      <div>
        <input
          type="radio"
          [name]="name()"
          [id]="opt"
          [value]="opt"
          [(ngModel)]="value"
        />
        <label
          [for]="opt"
          class="pl-2"
          >{{ opt }}</label
        >
      </div>
    }
  </fieldset>
</div>
